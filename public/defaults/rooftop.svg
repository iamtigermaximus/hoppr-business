<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#140e1a"/>
      <stop offset="40%" style="stop-color:#1a1020"/>
      <stop offset="70%" style="stop-color:#3b1a2a"/>
      <stop offset="100%" style="stop-color:#1a1414"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="75%" r="35%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.5"/>
      <stop offset="40%" style="stop-color:#ea580c;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="30%" r="30%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="400" cy="320" r="140" fill="url(#sun)"/>
  <circle cx="160" cy="120" r="120" fill="url(#glow2)"/>
  <!-- Skyline silhouette -->
  <rect x="100" y="260" width="80" height="140" fill="#0a0a0a" opacity="0.7"/>
  <rect x="190" y="220" width="60" height="180" fill="#0a0a0a" opacity="0.7"/>
  <rect x="260" y="250" width="50" height="150" fill="#0a0a0a" opacity="0.7"/>
  <rect x="320" y="200" width="90" height="200" fill="#0a0a0a" opacity="0.75"/>
  <rect x="420" y="240" width="70" height="160" fill="#0a0a0a" opacity="0.7"/>
  <rect x="500" y="270" width="55" height="130" fill="#0a0a0a" opacity="0.7"/>
  <rect x="565" y="230" width="65" height="170" fill="#0a0a0a" opacity="0.7"/>
  <rect x="640" y="255" width="70" height="145" fill="#0a0a0a" opacity="0.7"/>
  <!-- Sun highlight -->
  <ellipse cx="400" cy="310" rx="60" ry="8" fill="#f59e0b" opacity="0.5" filter="url(#soft)"/>
  <rect x="50" y="195" width="700" height="2" rx="1" fill="#f59e0b" opacity="0.4" filter="url(#soft)"/>
</svg>