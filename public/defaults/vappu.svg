<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14141a"/>
      <stop offset="50%" style="stop-color:#1a1418"/>
      <stop offset="100%" style="stop-color:#0f1a20"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="35%" r="35%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="55%" r="35%">
      <stop offset="0%" style="stop-color:#e5e7eb;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#e5e7eb;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="softsm"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="240" cy="140" r="140" fill="url(#glow1)"/>
  <circle cx="560" cy="220" r="130" fill="url(#glow2)"/>
  <!-- Balloon cluster -->
  <ellipse cx="300" cy="130" rx="20" ry="28" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.5" filter="url(#softsm)"/>
  <line x1="300" y1="158" x2="295" y2="180" stroke="#3b82f6" stroke-width="1.5" opacity="0.35"/>
  <ellipse cx="340" cy="110" rx="18" ry="25" fill="none" stroke="#e5e7eb" stroke-width="2.5" opacity="0.45" filter="url(#softsm)"/>
  <line x1="340" y1="135" x2="335" y2="160" stroke="#e5e7eb" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="270" cy="105" rx="16" ry="23" fill="none" stroke="#94a3b8" stroke-width="2.5" opacity="0.4" filter="url(#softsm)"/>
  <line x1="270" y1="128" x2="268" y2="152" stroke="#94a3b8" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="320" cy="95" rx="15" ry="20" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.4" filter="url(#softsm)"/>
  <line x1="320" y1="115" x2="318" y2="138" stroke="#60a5fa" stroke-width="1.5" opacity="0.3"/>
  <!-- Strings tied together -->
  <circle cx="310" cy="190" r="4" fill="none" stroke="#9ca3af" stroke-width="1.5" opacity="0.35"/>
  <!-- Confetti -->
  <rect x="450" y="100" width="10" height="4" rx="1" fill="#3b82f6" opacity="0.3" transform="rotate(30,455,102)"/>
  <rect x="520" y="80" width="8" height="3" rx="1" fill="#e5e7eb" opacity="0.28" transform="rotate(-20,524,81)"/>
  <rect x="480" y="140" width="9" height="3.5" rx="1" fill="#3b82f6" opacity="0.25" transform="rotate(45,484,141)"/>
  <rect x="560" y="130" width="7" height="3" rx="1" fill="#94a3b8" opacity="0.25" transform="rotate(-35,563,131)"/>
  <!-- Student cap hint (ylioppilaslakki) -->
  <ellipse cx="500" cy="260" rx="35" ry="12" fill="none" stroke="#e5e7eb" stroke-width="2" opacity="0.25" filter="url(#softsm)"/>
  <rect x="80" y="195" width="640" height="2.5" rx="1.25" fill="#3b82f6" opacity="0.3" filter="url(#soft)"/>
</svg>