<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1410"/>
      <stop offset="40%" style="stop-color:#1a1612"/>
      <stop offset="100%" style="stop-color:#12100e"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0.4"/>
      <stop offset="45%" style="stop-color:#d97706;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="30%" cy="60%" r="35%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="70%" cy="35%" r="30%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="big"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="400" cy="180" r="180" fill="url(#warmGlow)"/>
  <circle cx="240" cy="240" r="140" fill="url(#glow2)"/>
  <circle cx="560" cy="140" r="120" fill="url(#glow3)"/>
  <!-- Warm ambient band -->
  <ellipse cx="400" cy="290" rx="350" ry="50" fill="#d97706" opacity="0.2" filter="url(#big)"/>
  <!-- Shelf lines -->
  <rect x="80" y="240" width="640" height="3" rx="1.5" fill="#d97706" opacity="0.5" filter="url(#soft)"/>
  <rect x="180" y="285" width="440" height="2" rx="1" fill="#d97706" opacity="0.35" filter="url(#soft)"/>
  <!-- Vertical accent lines -->
  <line x1="250" y1="160" x2="250" y2="240" stroke="#d97706" stroke-width="3" opacity="0.4" filter="url(#soft)"/>
  <line x1="380" y1="130" x2="380" y2="240" stroke="#d97706" stroke-width="2" opacity="0.3" filter="url(#soft)"/>
  <line x1="550" y1="150" x2="550" y2="240" stroke="#d97706" stroke-width="3" opacity="0.4" filter="url(#soft)"/>
  <!-- Distant bar lights -->
  <circle cx="180" cy="150" r="8" fill="#d97706" opacity="0.5" filter="url(#big)"/>
  <circle cx="350" cy="130" r="10" fill="#f59e0b" opacity="0.45" filter="url(#big)"/>
  <circle cx="520" cy="140" r="9" fill="#d97706" opacity="0.5" filter="url(#big)"/>
  <circle cx="620" cy="160" r="7" fill="#d97706" opacity="0.4" filter="url(#big)"/>
  <circle cx="300" cy="310" r="6" fill="#a855f7" opacity="0.3" filter="url(#big)"/>
  <circle cx="480" cy="320" r="7" fill="#f59e0b" opacity="0.3" filter="url(#big)"/>
  <!-- Spec highlights -->
  <circle cx="140" cy="190" r="2" fill="#f59e0b" opacity="0.55"/>
  <circle cx="660" cy="200" r="2" fill="#f59e0b" opacity="0.5"/>
  <circle cx="400" cy="110" r="3" fill="#d97706" opacity="0.45"/>
</svg>