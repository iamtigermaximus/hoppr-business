<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0f0a08"/>
      <stop offset="100%" style="stop-color:#080808"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#c9a93c;stop-opacity:0.35"/>
      <stop offset="50%" style="stop-color:#c9a93c;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#c9a93c;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="big"><feGaussianBlur stdDeviation="15"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="400" cy="180" r="180" fill="url(#glow)"/>
  <!-- Large gold diamond -->
  <polygon points="400,50 480,180 400,310 320,180" fill="none" stroke="#c9a93c" stroke-width="3" opacity="0.7" filter="url(#soft)"/>
  <!-- Inner diamond -->
  <polygon points="400,100 450,180 400,260 350,180" fill="none" stroke="#c9a93c" stroke-width="2" opacity="0.5"/>
  <!-- Bold horizontal lines -->
  <line x1="80" y1="200" x2="320" y2="180" stroke="#c9a93c" stroke-width="2" opacity="0.55" filter="url(#soft)"/>
  <line x1="480" y1="180" x2="720" y2="200" stroke="#c9a93c" stroke-width="2" opacity="0.55" filter="url(#soft)"/>
  <!-- Gold dot accents -->
  <circle cx="400" cy="60" r="4" fill="#c9a93c" opacity="0.8"/>
  <circle cx="320" cy="160" r="3" fill="#c9a93c" opacity="0.6"/>
  <circle cx="480" cy="160" r="3" fill="#c9a93c" opacity="0.6"/>
  <circle cx="400" cy="280" r="4" fill="#c9a93c" opacity="0.5"/>
  <!-- Glow orbs -->
  <circle cx="400" cy="180" r="25" fill="#c9a93c" opacity="0.2" filter="url(#big)"/>
  <circle cx="280" cy="200" r="15" fill="#c9a93c" opacity="0.15" filter="url(#big)"/>
  <circle cx="520" cy="200" r="15" fill="#c9a93c" opacity="0.15" filter="url(#big)"/>
</svg>