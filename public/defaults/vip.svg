<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#g)"/>
  <rect x="40" y="40" width="720" height="320" rx="12" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="160" r="70" fill="#f59e0b" opacity="0.1"/>
  <text x="400" y="185" text-anchor="middle" font-size="70" filter="url(#glow)">👑</text>
  <text x="400" y="260" text-anchor="middle" font-size="28" fill="#f59e0b" font-family="system-ui, sans-serif" font-weight="700">VIP Experience</text>
  <text x="400" y="300" text-anchor="middle" font-size="15" fill="#6b7280" font-family="system-ui, sans-serif">Exclusive access & perks</text>
  <rect x="360" y="360" width="80" height="3" rx="2" fill="#f59e0b" opacity="0.5"/>
</svg>
