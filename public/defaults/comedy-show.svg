<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14141a"/>
      <stop offset="50%" style="stop-color:#1a1418"/>
      <stop offset="100%" style="stop-color:#0f141a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="40%" cy="60%" r="30%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="400" cy="160" r="140" fill="url(#glow1)"/>
  <circle cx="320" cy="240" r="120" fill="url(#glow2)"/>
  <!-- Stage spotlight beams -->
  <path d="M200 0 L280 400" stroke="#f59e0b" stroke-width="2" opacity="0.2" filter="url(#soft)"/>
  <path d="M600 0 L520 400" stroke="#f59e0b" stroke-width="2" opacity="0.2" filter="url(#soft)"/>
  <path d="M350 0 L380 400" stroke="#ec4899" stroke-width="1.5" opacity="0.15" filter="url(#soft)"/>
  <path d="M450 0 L420 400" stroke="#ec4899" stroke-width="1.5" opacity="0.15" filter="url(#soft)"/>
  <!-- Mic stand -->
  <line x1="400" y1="140" x2="400" y2="260" stroke="#f59e0b" stroke-width="2.5" opacity="0.45" filter="url(#soft)"/>
  <circle cx="400" cy="135" r="12" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.5" filter="url(#soft)"/>
  <line x1="400" y1="260" x2="370" y2="290" stroke="#f59e0b" stroke-width="2" opacity="0.35" filter="url(#soft)"/>
  <line x1="400" y1="260" x2="430" y2="290" stroke="#f59e0b" stroke-width="2" opacity="0.35" filter="url(#soft)"/>
  <!-- Smile / comedy masks hint -->
  <path d="M320 200 Q360 230 400 200" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.35" filter="url(#soft)"/>
  <rect x="100" y="195" width="600" height="2" rx="1" fill="#f59e0b" opacity="0.35" filter="url(#soft)"/>
</svg>