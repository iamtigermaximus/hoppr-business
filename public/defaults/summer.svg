<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1420"/>
      <stop offset="35%" style="stop-color:#1a1830"/>
      <stop offset="70%" style="stop-color:#3b1a0a"/>
      <stop offset="100%" style="stop-color:#1a1410"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="65%" r="40%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.5"/>
      <stop offset="35%" style="stop-color:#f59e0b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="25%" r="25%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="softsm"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="400" cy="300" r="160" fill="url(#sun)"/>
  <circle cx="160" cy="100" r="100" fill="url(#glow2)"/>
  <!-- Sun disc -->
  <circle cx="400" cy="290" r="50" fill="#fbbf24" opacity="0.2" filter="url(#soft)"/>
  <!-- Palm tree silhouette -->
  <line x1="200" y1="320" x2="200" y2="200" stroke="#1a1a1a" stroke-width="8" opacity="0.6"/>
  <path d="M200 200 Q140 180 130 210" fill="none" stroke="#1a1a1a" stroke-width="5" opacity="0.5"/>
  <path d="M200 210 Q250 180 270 200" fill="none" stroke="#1a1a1a" stroke-width="5" opacity="0.5"/>
  <path d="M200 215 Q180 195 160 180" fill="none" stroke="#1a1a1a" stroke-width="4" opacity="0.4"/>
  <path d="M200 215 Q240 200 260 185" fill="none" stroke="#1a1a1a" stroke-width="4" opacity="0.4"/>
  <!-- Water reflection line -->
  <ellipse cx="400" cy="350" rx="180" ry="8" fill="#fbbf24" opacity="0.2" filter="url(#soft)"/>
  <!-- Birds -->
  <path d="M100 60 Q110 52 120 60" fill="none" stroke="#9ca3af" stroke-width="1.5" opacity="0.25"/>
  <path d="M130 45 Q138 38 146 45" fill="none" stroke="#9ca3af" stroke-width="1.2" opacity="0.2"/>
  <rect x="80" y="195" width="640" height="2.5" rx="1.25" fill="#f59e0b" opacity="0.3" filter="url(#soft)"/>
</svg>