<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1518"/>
      <stop offset="30%" style="stop-color:#1a1815"/>
      <stop offset="100%" style="stop-color:#0f1414"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="35%" r="35%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="35%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="240" cy="140" r="140" fill="url(#glow1)"/>
  <circle cx="560" cy="240" r="140" fill="url(#glow2)"/>
  <!-- Champagne flutes -->
  <path d="M280 120 L290 200 L270 200 Z" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.45" filter="url(#soft)"/>
  <line x1="280" y1="200" x2="280" y2="240" stroke="#fbbf24" stroke-width="2" opacity="0.35" filter="url(#soft)"/>
  <path d="M520 150 L530 220 L510 220 Z" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.4" filter="url(#soft)"/>
  <line x1="520" y1="220" x2="520" y2="258" stroke="#ec4899" stroke-width="2" opacity="0.3" filter="url(#soft)"/>
  <!-- Bubbles -->
  <circle cx="275" cy="130" r="3" fill="#fbbf24" opacity="0.4" filter="url(#soft)"/>
  <circle cx="285" cy="145" r="2.5" fill="#fbbf24" opacity="0.35" filter="url(#soft)"/>
  <circle cx="278" cy="155" r="2" fill="#fbbf24" opacity="0.3" filter="url(#soft)"/>
  <circle cx="515" cy="160" r="3" fill="#ec4899" opacity="0.35" filter="url(#soft)"/>
  <circle cx="525" cy="175" r="2" fill="#ec4899" opacity="0.3" filter="url(#soft)"/>
  <!-- Croissant arc -->
  <path d="M350 260 Q370 230 400 260" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.35" filter="url(#soft)"/>
  <rect x="100" y="195" width="600" height="2.5" rx="1.25" fill="#fbbf24" opacity="0.4" filter="url(#soft)"/>
</svg>