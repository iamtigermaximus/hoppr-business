<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a12"/>
      <stop offset="40%" style="stop-color:#0d1a14"/>
      <stop offset="100%" style="stop-color:#14121a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="45%" cy="35%" r="40%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#10b981;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="60%" cy="55%" r="35%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="big"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="360" cy="140" r="160" fill="url(#glow1)"/>
  <circle cx="480" cy="220" r="140" fill="url(#glow2)"/>
  <!-- Bold diamond star -->
  <polygon points="400,40 460,160 400,280 340,160" fill="none" stroke="#10b981" stroke-width="3" opacity="0.55" filter="url(#soft)"/>
  <polygon points="400,100 430,160 400,220 370,160" fill="#10b981" opacity="0.2"/>
  <polygon points="400,120 415,160 400,200 385,160" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <!-- Radiating spark lines -->
  <line x1="400" y1="160" x2="180" y2="40" stroke="#f59e0b" stroke-width="2" opacity="0.5" filter="url(#soft)"/>
  <line x1="400" y1="160" x2="620" y2="40" stroke="#f59e0b" stroke-width="2" opacity="0.5" filter="url(#soft)"/>
  <line x1="400" y1="160" x2="140" y2="200" stroke="#10b981" stroke-width="1.5" opacity="0.4" filter="url(#soft)"/>
  <line x1="400" y1="160" x2="660" y2="200" stroke="#10b981" stroke-width="1.5" opacity="0.4" filter="url(#soft)"/>
  <line x1="400" y1="160" x2="250" y2="340" stroke="#f59e0b" stroke-width="1.5" opacity="0.35" filter="url(#soft)"/>
  <line x1="400" y1="160" x2="550" y2="340" stroke="#f59e0b" stroke-width="1.5" opacity="0.35" filter="url(#soft)"/>
  <!-- Gold sweep accent -->
  <ellipse cx="400" cy="310" rx="280" ry="8" fill="#f59e0b" opacity="0.35" filter="url(#big)"/>
  <!-- Dots -->
  <circle cx="400" cy="55" r="4" fill="#f59e0b" opacity="0.8"/>
  <circle cx="280" cy="130" r="3" fill="#10b981" opacity="0.6"/>
  <circle cx="520" cy="130" r="3" fill="#10b981" opacity="0.6"/>
  <circle cx="400" cy="260" r="3" fill="#f59e0b" opacity="0.55"/>
</svg>