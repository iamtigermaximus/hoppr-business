<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14100f"/>
      <stop offset="50%" style="stop-color:#1a1412"/>
      <stop offset="100%" style="stop-color:#0f1418"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="35%" cy="55%" r="30%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="softsm"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="400" cy="180" r="150" fill="url(#glow1)"/>
  <circle cx="280" cy="220" r="110" fill="url(#glow2)"/>
  <!-- Champagne bottle -->
  <rect x="370" y="140" width="16" height="80" rx="4" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.5" filter="url(#softsm)"/>
  <rect x="370" y="140" width="16" height="20" rx="4" fill="#f59e0b" opacity="0.12"/>
  <!-- Champagne cork popping -->
  <rect x="373" y="115" width="10" height="14" rx="3" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.4" transform="rotate(-15,378,122)" filter="url(#softsm)"/>
  <!-- Bubbles spraying -->
  <circle cx="350" cy="105" r="2.5" fill="#f59e0b" opacity="0.4" filter="url(#softsm)"/>
  <circle cx="395" cy="98" r="3" fill="#f59e0b" opacity="0.35" filter="url(#softsm)"/>
  <circle cx="370" cy="85" r="2" fill="#f59e0b" opacity="0.3" filter="url(#softsm)"/>
  <circle cx="410" cy="112" r="2" fill="#f59e0b" opacity="0.35" filter="url(#softsm)"/>
  <circle cx="340" cy="120" r="1.8" fill="#f59e0b" opacity="0.3" filter="url(#softsm)"/>
  <!-- Two flutes -->
  <path d="M300 200 L308 260 L292 260 Z" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.4" filter="url(#softsm)"/>
  <line x1="300" y1="260" x2="300" y2="290" stroke="#f59e0b" stroke-width="2" opacity="0.3" filter="url(#softsm)"/>
  <path d="M500 200 L508 260 L492 260 Z" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.4" filter="url(#softsm)"/>
  <line x1="500" y1="260" x2="500" y2="290" stroke="#f59e0b" stroke-width="2" opacity="0.3" filter="url(#softsm)"/>
  <!-- Golden sparkles -->
  <circle cx="400" cy="170" r="1.5" fill="#fef08a" opacity="0.5"/>
  <circle cx="330" cy="210" r="1.5" fill="#fef08a" opacity="0.45"/>
  <circle cx="460" cy="230" r="1.5" fill="#fef08a" opacity="0.4"/>
  <rect x="80" y="195" width="640" height="2.5" rx="1.25" fill="#f59e0b" opacity="0.35" filter="url(#soft)"/>
</svg>