<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#140c0c"/>
      <stop offset="50%" style="stop-color:#1a0f12"/>
      <stop offset="100%" style="stop-color:#0f0f14"/>
    </linearGradient>
    <radialGradient id="glow1" cx="40%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="60%" cy="55%" r="35%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="320" cy="160" r="160" fill="url(#glow1)"/>
  <circle cx="480" cy="240" r="140" fill="url(#glow2)"/>
  <!-- Velvet curtain waves -->
  <path d="M0 0 Q100 40 200 0 Q300 40 400 0 Q500 40 600 0 Q700 40 800 0" fill="none" stroke="#dc2626" stroke-width="2.5" opacity="0.45" filter="url(#soft)"/>
  <path d="M0 60 Q120 100 240 60 Q360 100 480 60 Q600 100 720 60 Q780 80 800 70" fill="none" stroke="#f59e0b" stroke-width="1.8" opacity="0.35" filter="url(#soft)"/>
  <!-- Gold accent lines -->
  <rect x="80" y="190" width="640" height="3" rx="1.5" fill="#f59e0b" opacity="0.5" filter="url(#soft)"/>
  <rect x="80" y="210" width="640" height="1" rx="0.5" fill="#f59e0b" opacity="0.25" filter="url(#soft)"/>
  <!-- Highlight orbs -->
  <circle cx="300" cy="150" r="10" fill="#dc2626" opacity="0.4" filter="url(#soft)"/>
  <circle cx="500" cy="220" r="8" fill="#f59e0b" opacity="0.35" filter="url(#soft)"/>
</svg>