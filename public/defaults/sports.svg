<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a141a"/>
      <stop offset="50%" style="stop-color:#0a161a"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="35%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#0284c7;stop-opacity:0.45"/>
      <stop offset="50%" style="stop-color:#0284c7;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="65%" cy="55%" r="35%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </radialGradient>
    <filter id="motion"><feGaussianBlur stdDeviation="12 0"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="280" cy="160" r="160" fill="url(#glow1)"/>
  <circle cx="520" cy="220" r="140" fill="url(#glow2)"/>
  <!-- Bold motion/speed lines -->
  <line x1="40" y1="180" x2="250" y2="180" stroke="#38bdf8" stroke-width="4" opacity="0.55" filter="url(#motion)"/>
  <line x1="60" y1="205" x2="230" y2="205" stroke="#0284c7" stroke-width="3" opacity="0.4" filter="url(#motion)"/>
  <line x1="80" y1="155" x2="210" y2="155" stroke="#38bdf8" stroke-width="2" opacity="0.35" filter="url(#motion)"/>
  <line x1="550" y1="220" x2="750" y2="220" stroke="#38bdf8" stroke-width="4" opacity="0.55" filter="url(#motion)"/>
  <line x1="570" y1="245" x2="740" y2="245" stroke="#0284c7" stroke-width="3" opacity="0.4" filter="url(#motion)"/>
  <line x1="580" y1="195" x2="720" y2="195" stroke="#38bdf8" stroke-width="2" opacity="0.35" filter="url(#motion)"/>
  <!-- Concentric target circles -->
  <circle cx="400" cy="200" r="95" fill="none" stroke="#0284c7" stroke-width="2.5" opacity="0.55" filter="url(#soft)"/>
  <circle cx="400" cy="200" r="60" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.45"/>
  <circle cx="400" cy="200" r="30" fill="none" stroke="#0284c7" stroke-width="1.5" opacity="0.35"/>
  <circle cx="400" cy="200" r="6" fill="#38bdf8" opacity="0.7"/>
  <!-- Crosslines -->
  <line x1="400" y1="105" x2="400" y2="295" stroke="#0284c7" stroke-width="1.5" opacity="0.3"/>
  <line x1="305" y1="200" x2="495" y2="200" stroke="#0284c7" stroke-width="1.5" opacity="0.3"/>
  <!-- Particle dots -->
  <circle cx="200" cy="120" r="4" fill="#38bdf8" opacity="0.65"/>
  <circle cx="170" cy="260" r="3" fill="#0284c7" opacity="0.5"/>
  <circle cx="600" cy="130" r="4" fill="#38bdf8" opacity="0.6"/>
  <circle cx="640" cy="270" r="3" fill="#0284c7" opacity="0.45"/>
</svg>