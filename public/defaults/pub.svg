<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a140f"/>
      <stop offset="50%" style="stop-color:#14100c"/>
      <stop offset="100%" style="stop-color:#0f1410"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#92400e;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="240" cy="200" r="160" fill="url(#glow1)"/>
  <circle cx="560" cy="160" r="140" fill="url(#glow2)"/>
  <!-- Wood plank lines -->
  <line x1="0" y1="120" x2="800" y2="115" stroke="#92400e" stroke-width="1.5" opacity="0.3" filter="url(#soft)"/>
  <line x1="0" y1="180" x2="800" y2="178" stroke="#92400e" stroke-width="1.5" opacity="0.3" filter="url(#soft)"/>
  <line x1="0" y1="240" x2="800" y2="242" stroke="#92400e" stroke-width="1.5" opacity="0.3" filter="url(#soft)"/>
  <line x1="0" y1="300" x2="800" y2="297" stroke="#92400e" stroke-width="1.5" opacity="0.25" filter="url(#soft)"/>
  <!-- Pint glass silhouettes -->
  <ellipse cx="340" cy="170" rx="30" ry="40" fill="none" stroke="#d97706" stroke-width="2.5" opacity="0.5" filter="url(#soft)"/>
  <ellipse cx="460" cy="200" rx="25" ry="35" fill="none" stroke="#d97706" stroke-width="2" opacity="0.45" filter="url(#soft)"/>
  <rect x="310" y="160" width="60" height="6" rx="3" fill="#d97706" opacity="0.25" filter="url(#soft)"/>
  <rect x="435" y="190" width="50" height="5" rx="2.5" fill="#d97706" opacity="0.22" filter="url(#soft)"/>
  <!-- Accent -->
  <rect x="100" y="195" width="600" height="2" rx="1" fill="#d97706" opacity="0.4" filter="url(#soft)"/>
</svg>