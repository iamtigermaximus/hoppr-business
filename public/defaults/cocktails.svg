<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a14"/>
      <stop offset="40%" style="stop-color:#1a0f1a"/>
      <stop offset="100%" style="stop-color:#0f1418"/>
    </linearGradient>
    <radialGradient id="glow1" cx="35%" cy="35%" r="45%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.5"/>
      <stop offset="40%" style="stop-color:#e94560;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="65%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="280" cy="140" r="180" fill="url(#glow1)"/>
  <circle cx="520" cy="260" r="160" fill="url(#glow2)"/>
  <!-- Bold overlapping ellipses — drink glass motif -->
  <ellipse cx="400" cy="200" rx="160" ry="70" fill="none" stroke="#e94560" stroke-width="3" opacity="0.5" transform="rotate(-8,400,200)" filter="url(#soft)"/>
  <ellipse cx="400" cy="200" rx="120" ry="50" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.45" transform="rotate(6,400,200)" filter="url(#soft)"/>
  <ellipse cx="400" cy="200" rx="80" ry="32" fill="#e94560" opacity="0.15" transform="rotate(-4,400,200)"/>
  <!-- Horizontal accent bar -->
  <rect x="100" y="195" width="600" height="3" rx="1.5" fill="#e94560" opacity="0.5" filter="url(#soft)"/>
  <!-- Highlight circles -->
  <circle cx="280" cy="140" r="14" fill="#e94560" opacity="0.5" filter="url(#soft)"/>
  <circle cx="520" cy="240" r="10" fill="#f59e0b" opacity="0.45" filter="url(#soft)"/>
  <circle cx="400" cy="280" r="8" fill="#e94560" opacity="0.35" filter="url(#soft)"/>
</svg>