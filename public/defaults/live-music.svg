<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="40%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#0f0a1a"/>
    </linearGradient>
    <radialGradient id="spotlight1" cx="40%" cy="30%" r="35%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="spotlight2" cx="65%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="big"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="320" cy="120" r="140" fill="url(#spotlight1)"/>
  <circle cx="520" cy="200" r="120" fill="url(#spotlight2)"/>
  <!-- Bold sound wave bars -->
  <rect x="320" y="170" width="10" height="50" rx="5" fill="#3b82f6" opacity="0.6" filter="url(#big)"/>
  <rect x="340" y="140" width="10" height="80" rx="5" fill="#3b82f6" opacity="0.7" filter="url(#big)"/>
  <rect x="360" y="110" width="10" height="110" rx="5" fill="#3b82f6" opacity="0.8" filter="url(#big)"/>
  <rect x="380" y="130" width="10" height="90" rx="5" fill="#3b82f6" opacity="0.7" filter="url(#big)"/>
  <rect x="400" y="160" width="10" height="60" rx="5" fill="#3b82f6" opacity="0.6" filter="url(#big)"/>
  <rect x="420" y="140" width="10" height="80" rx="5" fill="#8b5cf6" opacity="0.7" filter="url(#big)"/>
  <rect x="440" y="120" width="10" height="100" rx="5" fill="#8b5cf6" opacity="0.8" filter="url(#big)"/>
  <rect x="460" y="150" width="10" height="70" rx="5" fill="#8b5cf6" opacity="0.65" filter="url(#big)"/>
  <rect x="480" y="170" width="10" height="50" rx="5" fill="#8b5cf6" opacity="0.55" filter="url(#big)"/>
  <!-- Stage light beams -->
  <line x1="320" y1="0" x2="220" y2="240" stroke="#3b82f6" stroke-width="2" opacity="0.4" filter="url(#soft)"/>
  <line x1="320" y1="0" x2="420" y2="240" stroke="#8b5cf6" stroke-width="2" opacity="0.35" filter="url(#soft)"/>
  <line x1="520" y1="0" x2="420" y2="300" stroke="#3b82f6" stroke-width="1.5" opacity="0.3" filter="url(#soft)"/>
  <line x1="520" y1="0" x2="620" y2="300" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3" filter="url(#soft)"/>
</svg>