<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1008"/>
      <stop offset="50%" style="stop-color:#141006"/>
      <stop offset="100%" style="stop-color:#0f1410"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="35%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="240" cy="160" r="160" fill="url(#glow1)"/>
  <circle cx="560" cy="240" r="140" fill="url(#glow2)"/>
  <!-- Hop cones -->
  <ellipse cx="320" cy="180" rx="18" ry="30" fill="none" stroke="#d97706" stroke-width="2.5" opacity="0.6" transform="rotate(-10,320,180)" filter="url(#soft)"/>
  <ellipse cx="320" cy="180" rx="10" ry="18" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.5" transform="rotate(-10,320,180)" filter="url(#soft)"/>
  <ellipse cx="480" cy="240" rx="16" ry="26" fill="none" stroke="#d97706" stroke-width="2" opacity="0.55" transform="rotate(8,480,240)" filter="url(#soft)"/>
  <ellipse cx="480" cy="240" rx="9" ry="16" fill="none" stroke="#f59e0b" stroke-width="1.8" opacity="0.45" transform="rotate(8,480,240)" filter="url(#soft)"/>
  <!-- Wheat/barley stalks -->
  <line x1="200" y1="280" x2="180" y2="200" stroke="#d97706" stroke-width="2" opacity="0.5" filter="url(#soft)"/>
  <line x1="600" y1="300" x2="620" y2="220" stroke="#d97706" stroke-width="2" opacity="0.5" filter="url(#soft)"/>
  <ellipse cx="180" cy="195" rx="8" ry="3" fill="#f59e0b" opacity="0.4" transform="rotate(30,180,195)"/>
  <ellipse cx="620" cy="215" rx="8" ry="3" fill="#f59e0b" opacity="0.4" transform="rotate(-30,620,215)"/>
  <rect x="100" y="195" width="600" height="2.5" rx="1.25" fill="#d97706" opacity="0.4" filter="url(#soft)"/>
</svg>