<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0814"/>
      <stop offset="50%" style="stop-color:#0f0a1a"/>
      <stop offset="100%" style="stop-color:#080a14"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="30%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="65%" r="40%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="200" cy="120" r="180" fill="url(#glow1)"/>
  <circle cx="600" cy="280" r="160" fill="url(#glow2)"/>
  <!-- Laser beams -->
  <line x1="0" y1="100" x2="800" y2="300" stroke="#7c3aed" stroke-width="2" opacity="0.3" filter="url(#soft)"/>
  <line x1="0" y1="200" x2="800" y2="150" stroke="#ec4899" stroke-width="1.5" opacity="0.25" filter="url(#soft)"/>
  <line x1="0" y1="320" x2="800" y2="80" stroke="#7c3aed" stroke-width="1.5" opacity="0.2" filter="url(#soft)"/>
  <!-- Disco ball rays -->
  <circle cx="400" cy="60" r="40" fill="#ec4899" opacity="0.12" filter="url(#soft)"/>
  <line x1="400" y1="100" x2="250" y2="350" stroke="#ec4899" stroke-width="1" opacity="0.15" filter="url(#soft)"/>
  <line x1="400" y1="100" x2="550" y2="350" stroke="#ec4899" stroke-width="1" opacity="0.15" filter="url(#soft)"/>
  <line x1="400" y1="100" x2="150" y2="250" stroke="#ec4899" stroke-width="1" opacity="0.12" filter="url(#soft)"/>
  <line x1="400" y1="100" x2="650" y2="250" stroke="#ec4899" stroke-width="1" opacity="0.12" filter="url(#soft)"/>
  <!-- Accent bar -->
  <rect x="100" y="195" width="600" height="2" rx="1" fill="#7c3aed" opacity="0.5" filter="url(#soft)"/>
</svg>