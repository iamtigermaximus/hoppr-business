<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#140a0f"/>
      <stop offset="50%" style="stop-color:#160d12"/>
      <stop offset="100%" style="stop-color:#0a080a"/>
    </linearGradient>
    <radialGradient id="glow" cx="45%" cy="40%" r="45%">
      <stop offset="0%" style="stop-color:#9b2226;stop-opacity:0.45"/>
      <stop offset="45%" style="stop-color:#7f1d1d;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#7f1d1d;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="60%" cy="55%" r="35%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="big"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="360" cy="180" r="180" fill="url(#glow)"/>
  <circle cx="480" cy="240" r="140" fill="url(#glow2)"/>
  <!-- Bold vine-like curves -->
  <path d="M 100 300 C 200 260 250 340 400 310 C 550 280 600 350 700 300" fill="none" stroke="#9b2226" stroke-width="3" opacity="0.6" filter="url(#soft)"/>
  <path d="M 130 260 C 280 220 320 300 400 270 C 500 240 580 300 680 250" fill="none" stroke="#7f1d1d" stroke-width="2" opacity="0.45" filter="url(#soft)"/>
  <path d="M 180 350 C 300 310 350 370 450 340 C 550 310 600 350 650 330" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.4" filter="url(#soft)"/>
  <!-- Strong highlight orbs -->
  <circle cx="280" cy="150" r="12" fill="#9b2226" opacity="0.55" filter="url(#big)"/>
  <circle cx="500" cy="210" r="10" fill="#a855f7" opacity="0.45" filter="url(#big)"/>
  <circle cx="400" cy="300" r="16" fill="#9b2226" opacity="0.4" filter="url(#big)"/>
</svg>