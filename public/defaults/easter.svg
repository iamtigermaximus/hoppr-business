<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1418"/>
      <stop offset="50%" style="stop-color:#1a1814"/>
      <stop offset="100%" style="stop-color:#141a14"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="65%" cy="55%" r="30%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="25%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="softsm"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="240" cy="160" r="140" fill="url(#glow1)"/>
  <circle cx="520" cy="220" r="120" fill="url(#glow2)"/>
  <circle cx="400" cy="200" r="100" fill="url(#glow3)"/>
  <!-- Egg shapes -->
  <ellipse cx="320" cy="170" rx="22" ry="30" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.45" transform="rotate(-10,320,170)" filter="url(#softsm)"/>
  <!-- Egg stripes -->
  <path d="M305 155 Q310 160 305 165" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.35"/>
  <path d="M315 152 Q320 157 315 162" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.35"/>
  <path d="M335 155 Q330 160 335 165" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.35"/>

  <ellipse cx="480" cy="185" rx="20" ry="28" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.4" transform="rotate(8,480,185)" filter="url(#softsm)"/>
  <path d="M467 172 Q472 178 467 184" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
  <path d="M493 172 Q488 178 493 184" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.3"/>

  <!-- Willow branches (pajunkissa / virpominen) -->
  <path d="M560 160 Q570 130 580 110" fill="none" stroke="#16a34a" stroke-width="2" opacity="0.3" filter="url(#softsm)"/>
  <circle cx="580" cy="108" r="3" fill="#e5e7eb" opacity="0.3"/>
  <path d="M565 150 Q578 120 590 100" fill="none" stroke="#16a34a" stroke-width="1.5" opacity="0.25" filter="url(#softsm)"/>
  <circle cx="590" cy="98" r="2.5" fill="#e5e7eb" opacity="0.25"/>
  <!-- Chick hint -->
  <circle cx="200" cy="260" r="12" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.3"/>
  <polygon points="200,250 203,244 206,250" fill="#fbbf24" opacity="0.25"/>
  <rect x="80" y="195" width="640" height="2.5" rx="1.25" fill="#fbbf24" opacity="0.3" filter="url(#soft)"/>
</svg>