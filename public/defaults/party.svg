<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a1a"/>
      <stop offset="50%" style="stop-color:#0f0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a0f"/>
    </linearGradient>
    <radialGradient id="orb1" cx="25%" cy="30%" r="30%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="75%" cy="65%" r="35%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="40%" r="25%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="big"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="200" cy="120" r="120" fill="url(#orb1)"/>
  <circle cx="600" cy="260" r="140" fill="url(#orb2)"/>
  <circle cx="400" cy="160" r="100" fill="url(#orb3)"/>
  <!-- Bold neon streak paths -->
  <path d="M -20 80 Q 200 60 400 120 Q 600 180 820 140" fill="none" stroke="#ec4899" stroke-width="3" opacity="0.55" filter="url(#soft)"/>
  <path d="M -20 200 Q 250 160 450 220 Q 650 280 820 240" fill="none" stroke="#7c3aed" stroke-width="2.5" opacity="0.5" filter="url(#soft)"/>
  <path d="M 80 400 Q 200 290 400 340 Q 600 380 720 400" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.45" filter="url(#soft)"/>
  <!-- Bold floating dots -->
  <circle cx="150" cy="90" r="5" fill="#ec4899" opacity="0.75"/>
  <circle cx="350" cy="60" r="4" fill="#7c3aed" opacity="0.7"/>
  <circle cx="550" cy="100" r="6" fill="#06b6d4" opacity="0.65"/>
  <circle cx="680" cy="180" r="4" fill="#ec4899" opacity="0.6"/>
  <circle cx="250" cy="300" r="5" fill="#7c3aed" opacity="0.5"/>
  <circle cx="500" cy="350" r="4" fill="#06b6d4" opacity="0.5"/>
</svg>