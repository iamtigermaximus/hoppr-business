<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1008"/>
      <stop offset="40%" style="stop-color:#1a120a"/>
      <stop offset="100%" style="stop-color:#0f0f0f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#d97706;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="400" cy="220" r="200" fill="url(#glow)"/>
  <!-- Large foam bubble clusters -->
  <circle cx="200" cy="290" r="50" fill="#f59e0b" opacity="0.3" filter="url(#blur)"/>
  <circle cx="300" cy="260" r="35" fill="#f59e0b" opacity="0.35" filter="url(#blur)"/>
  <circle cx="400" cy="300" r="45" fill="#d97706" opacity="0.3" filter="url(#blur)"/>
  <circle cx="500" cy="270" r="40" fill="#f59e0b" opacity="0.35" filter="url(#blur)"/>
  <circle cx="580" cy="300" r="35" fill="#d97706" opacity="0.3" filter="url(#blur)"/>
  <circle cx="150" cy="250" r="25" fill="#f59e0b" opacity="0.25" filter="url(#blur)"/>
  <circle cx="650" cy="280" r="30" fill="#f59e0b" opacity="0.25" filter="url(#blur)"/>
  <!-- Small sharp bubbles -->
  <circle cx="250" cy="310" r="8" fill="#f59e0b" opacity="0.6" filter="url(#soft)"/>
  <circle cx="360" cy="270" r="6" fill="#f59e0b" opacity="0.55" filter="url(#soft)"/>
  <circle cx="480" cy="320" r="7" fill="#d97706" opacity="0.5" filter="url(#soft)"/>
  <circle cx="550" cy="250" r="5" fill="#f59e0b" opacity="0.5" filter="url(#soft)"/>
  <!-- Foam band at bottom -->
  <rect x="0" y="300" width="800" height="6" rx="3" fill="#f59e0b" opacity="0.5" filter="url(#soft)"/>
  <rect x="40" y="320" width="720" height="3" rx="1.5" fill="#d97706" opacity="0.35" filter="url(#soft)"/>
</svg>