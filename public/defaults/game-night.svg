<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f141a"/>
      <stop offset="50%" style="stop-color:#101414"/>
      <stop offset="100%" style="stop-color:#14100f"/>
    </linearGradient>
    <radialGradient id="glow1" cx="35%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="65%" cy="55%" r="35%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="280" cy="160" r="140" fill="url(#glow1)"/>
  <circle cx="520" cy="220" r="140" fill="url(#glow2)"/>
  <!-- Dice -->
  <rect x="220" y="140" width="50" height="50" rx="8" fill="none" stroke="#e94560" stroke-width="2.5" opacity="0.5" transform="rotate(-10,245,165)" filter="url(#soft)"/>
  <circle cx="235" cy="155" r="4" fill="#e94560" opacity="0.5"/>
  <circle cx="255" cy="175" r="4" fill="#e94560" opacity="0.5"/>
  <!-- Playing card -->
  <rect x="530" y="190" width="40" height="56" rx="6" fill="none" stroke="#7c3aed" stroke-width="2.5" opacity="0.5" transform="rotate(12,550,218)" filter="url(#soft)"/>
  <text x="538" y="210" font-family="serif" font-size="18" fill="#7c3aed" opacity="0.5" transform="rotate(12,550,218)">A</text>
  <text x="554" y="238" font-family="serif" font-size="14" fill="#7c3aed" opacity="0.4" transform="rotate(12,550,218)">♠</text>
  <!-- Game controller hint -->
  <ellipse cx="400" cy="300" rx="60" ry="25" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.3" filter="url(#soft)"/>
  <rect x="100" y="195" width="600" height="2.5" rx="1.25" fill="#e94560" opacity="0.35" filter="url(#soft)"/>
</svg>